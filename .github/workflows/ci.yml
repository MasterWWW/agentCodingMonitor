name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p vibe-core
      - run: cargo build -p vibe-hook -p vibe-core

  desktop:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cargo build -p vibe-hook --release
      - run: npm ci
        working-directory: apps/desktop
      - run: npm run build
        working-directory: apps/desktop
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@2
      - name: Tauri build
        working-directory: apps/desktop
        run: tauri build
        env:
          CI: true
